---
# Registers bare-metal nodes with Metal3 by creating, per node:
#   - <node>-bmc-credentials Secret  — Redfish auth for Ironic
#   - <node>-networkdata Secret      — nmstate; consumed by both
#                                      preprovisioningNetworkDataName (IPA ramdisk)
#                                      and spec.networkData (deployed OS config-2)
#   - <node> BareMetalHost CR        — triggers Ironic provisioning
#
# Hostname is delivered via meta_data.json on config-2 (Ironic populates it from
# the BMH name) and applied by custom/scripts/02-configure-network.sh at first
# boot. No userData ignition needed.
#
# Prerequisites:
#   - Management cluster running (RKE2 + Rancher + MetalLB + Ironic + BMO + CAPM3)
#   - KUBECONFIG points at the management cluster
#   - ansible-galaxy collection install -r ansible/requirements.yml
#   - eib_image_http_url and eib_image_checksum set in inventory
#   - EIB raw image hosted and reachable from Ironic
#
# Ref: https://documentation.suse.com/suse-edge/3.5/html/edge/quickstart-metal3.html
#
# Usage:
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/register-nodes.yml
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/register-nodes.yml --limit node01

- name: Register nodes with Metal3
  hosts: all
  gather_facts: false
  vars:
    root_dir: "{{ playbook_dir }}/../.."

  tasks:
    - name: Create BMC credentials Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ inventory_hostname }}-bmc-credentials"
            namespace: "{{ metal3_namespace }}"
          type: Opaque
          stringData:
            username: "{{ bmc_user }}"
            password: "{{ bmc_password }}"
      delegate_to: localhost

    - name: Create networkData Secret (nmstate — IPA + deployed OS)
      kubernetes.core.k8s:
        state: present
        template: "{{ root_dir }}/metal3/networkdata-secret.j2"
      delegate_to: localhost

    - name: Apply BareMetalHost CR
      kubernetes.core.k8s:
        state: present
        template: "{{ root_dir }}/metal3/baremetalhost.j2"
      delegate_to: localhost
