---
# Injects a per-node network combustion ISO via Redfish virtual media.
#
# Prerequisites:
#   - ansible-galaxy collection install -r ansible/requirements.yml
#   - ISO(s) generated with: task generate-node -- <node>
#   - ISOs served over HTTP at iso_http_base (e.g. python3 -m http.server 8080 -d _network-builds/)
#   - BMC passwords in secrets/bmc-<node> (git-ignored)
#
# Usage:
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/inject-network.yml
#   ansible-playbook -i ansible/inventory.yml ansible/playbooks/inject-network.yml --limit node01

- name: Inject network config via Redfish virtual media
  hosts: all
  gather_facts: false

  tasks:
    - name: Eject any existing virtual media
      community.general.redfish_command:
        category: Manager
        command: VirtualMediaEject
        baseuri: "{{ bmc_ip }}"
        username: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        virtual_media_url: "{{ iso_http_base }}/{{ inventory_hostname }}-network.iso"
      ignore_errors: true

    - name: Insert network combustion ISO as virtual media
      community.general.redfish_command:
        category: Manager
        command: VirtualMediaInsert
        baseuri: "{{ bmc_ip }}"
        username: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        virtual_media_url: "{{ iso_http_base }}/{{ inventory_hostname }}-network.iso"
        media_types:
          - CD

    - name: Set one-time boot from virtual CD
      community.general.redfish_command:
        category: Systems
        command: SetOneTimeBoot
        baseuri: "{{ bmc_ip }}"
        username: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        bootdevice: Cd

    - name: Reboot node
      community.general.redfish_command:
        category: Systems
        command: PowerReboot
        baseuri: "{{ bmc_ip }}"
        username: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
