all:
  vars:
    # Metal3 / Ironic — see docs/ADR-001
    metal3_namespace: metal3-system
    bmc_system_id: "1"                     # Redfish system ID — vendor-specific (iLO: 1, iDRAC: System.Embedded.1)
    # HTTP URL where the EIB-built raw image is served (must be reachable by Ironic)
    eib_image_http_url: http://192.168.0.100:8080/edge-nvidia-k3s-slmicro62.raw
    eib_image_checksum: ""                 # sha256sum of the raw image — fill in after build
    eib_image_checksum_type: sha256

  hosts:
    node01:
      # BMC
      bmc_ip: 192.168.0.10
      bmc_user: admin
      bmc_password: "{{ lookup('file', inventory_dir + '/../secrets/bmc-node01') }}"
      # Network
      node_hostname: node01
      node_interface: eth0
      node_mac: aa:bb:cc:dd:ee:ff
      node_ip: 192.168.1.10
      node_prefix: 24
      node_gateway: 192.168.1.1
      node_dns: 192.168.1.1

    node02:
      # BMC
      bmc_ip: 192.168.0.11
      bmc_user: admin
      bmc_password: "{{ lookup('file', inventory_dir + '/../secrets/bmc-node02') }}"
      # Network
      node_hostname: node02
      node_interface: eth0
      node_mac: bb:cc:dd:ee:ff:00
      node_ip: 192.168.1.11
      node_prefix: 24
      node_gateway: 192.168.1.1
      node_dns: 192.168.1.1
