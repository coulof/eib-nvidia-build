all:
  vars:
    # --- Ansible+Redfish (legacy, ADR-001 Option B) ---
    # HTTP URL where generated node ISOs are served (must be reachable from BMC)
    iso_http_base: http://192.168.0.100:8080
    eib_image: registry.suse.com/edge/3.5/edge-image-builder:1.3.3
    container_engine: podman

    # --- Metal3 (ADR-002) ---
    metal3_namespace: metal3-system
    bmc_system_id: "1"                     # Redfish system ID — check vendor docs (iLO: 1, iDRAC: System.Embedded.1)
    # URL where the EIB-built ISO is served and accessible by Ironic (set once image is hosted)
    eib_image_http_url: http://192.168.0.100:8080/edge-nvidia-k3s-slmicro62.iso
    eib_image_checksum: ""                 # md5sum of the ISO — fill in after build
    eib_image_checksum_type: md5

  hosts:
    node01:
      # BMC
      bmc_ip: 192.168.0.10
      bmc_user: admin
      bmc_password: "{{ lookup('file', inventory_dir + '/../secrets/bmc-node01') }}"
      # Network
      node_hostname: node01
      node_interface: eth0
      node_mac: aa:bb:cc:dd:ee:ff
      node_ip: 192.168.1.10
      node_prefix: 24
      node_gateway: 192.168.1.1
      node_dns: 192.168.1.1

    node02:
      # BMC
      bmc_ip: 192.168.0.11
      bmc_user: admin
      bmc_password: "{{ lookup('file', inventory_dir + '/../secrets/bmc-node02') }}"
      # Network
      node_hostname: node02
      node_interface: eth0
      node_mac: bb:cc:dd:ee:ff:00
      node_ip: 192.168.1.11
      node_prefix: 24
      node_gateway: 192.168.1.1
      node_dns: 192.168.1.1
